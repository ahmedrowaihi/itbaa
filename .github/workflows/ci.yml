name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify-patches:
        name: Verify patch applies (${{ matrix.variant.name }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                variant:
                    - name: vanilla
                      repo: LadybirdBrowser/ladybird
                      ref: master
                    - name: arabic
                      repo: ahmedrowaihi/ladybird-itbaa
                      ref: itbaa

        steps:
            - name: Checkout Itbaa
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Checkout Ladybird (${{ matrix.variant.name }})
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  repository: ${{ matrix.variant.repo }}
                  ref: ${{ matrix.variant.ref }}
                  path: ladybird
                  fetch-depth: 1
                  persist-credentials: false

            - name: Verify patch applies
              run: |
                  cd ladybird
                  git apply --check ../patches/*.patch
                  git apply ../patches/*.patch
                  echo "✓ Patch applies cleanly on ${{ matrix.variant.name }} ($(git rev-parse --short HEAD))"

            - name: Verify Itbaa files exist
              run: |
                  cd ladybird
                  test -f Utilities/Itbaa/cli/main.cpp
                  test -f Utilities/Itbaa/lib/Itbaa.h
                  test -f Utilities/Itbaa/lib/Itbaa.cpp
                  echo "✓ All Itbaa files present"
