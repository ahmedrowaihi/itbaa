name: Publish npm wrapper

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New wrapper version (patch bump on the current binary, e.g. 1.1.1)"
        required: true

concurrency:
  group: npm-wrapper-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the npm-v* GitHub release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        working-directory: npm/itbaa
        run: npm ci

      - name: Set version + pin the current binary
        working-directory: npm/itbaa
        run: |
          # The current binary = the latest published platform package; pin the wrapper to it.
          binary="$(npm view @ahmedrowaihi/itbaa-linux-x64 version)"
          node ../scripts/set-wrapper-version.mjs "${GITHUB_EVENT_INPUTS_VERSION}" "$binary"
        env:
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}

      - name: Publish wrapper
        working-directory: npm/itbaa
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public # prepublishOnly runs the build

      # GitHub release for the wrapper-only publish. Tagged npm-v* (NOT v*) so it doesn't trigger
      # the binary release workflow. Binaries are unchanged — the wrapper just pins to the current one.
      - name: GitHub release (npm wrapper)
        working-directory: npm/itbaa
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          tarball="$(npm pack | tail -n1)"
          binary="$(node -p "require('./package.json').optionalDependencies['@ahmedrowaihi/itbaa-linux-x64']")"
          printf '%s\n\n%s\n' \
            "Wrapper-only npm release \`@ahmedrowaihi/itbaa@$VERSION\`, pinned to binary \`v$binary\` (binaries unchanged)." \
            "Install: \`npm install @ahmedrowaihi/itbaa@$VERSION\` — https://www.npmjs.com/package/@ahmedrowaihi/itbaa" > /tmp/notes.md
          gh release create "npm-v$VERSION" "$tarball" -R "$GITHUB_REPOSITORY" \
            --title "npm v$VERSION (wrapper)" --notes-file /tmp/notes.md
