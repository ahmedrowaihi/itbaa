name: Publish npm

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.1.0)"
        required: true

concurrency:
  group: npm-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Build wrapper
        working-directory: npm/itbaa
        run: |
          npm ci
          npm run build

      - name: Download + extract binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          mkdir -p bins dl
          gh release download "$TAG" -R "${{ github.repository }}" -p 'itbaa-arabic-*' -D dl
          for f in dl/itbaa-arabic-linux-*.tar.gz; do tar -xzf "$f" -C bins; done
          for f in dl/itbaa-arabic-macos-*.zip; do unzip -o "$f" -d bins; done

      - name: Assemble packages
        env:
          BIN_DIR: ${{ github.workspace }}/bins
        run: node npm/scripts/prepare.mjs "${{ inputs.tag }}"

      # Platform packages first so the wrapper's optionalDependencies resolve on the registry.
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in npm/platforms/itbaa-*; do
            echo "publishing $d"
            (cd "$d" && npm publish --access public)
          done

      - name: Publish wrapper
        working-directory: npm/itbaa
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
