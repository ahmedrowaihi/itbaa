name: Publish npm

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.1.0)"
        required: true

concurrency:
  group: npm-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the npm tarball to the existing v* release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Build wrapper
        working-directory: npm/itbaa
        run: |
          npm ci
          npm run build

      - name: Download + extract binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          mkdir -p bins dl
          gh release download "$TAG" -R "${{ github.repository }}" -p 'itbaa-arabic-*' -D dl
          for f in dl/itbaa-arabic-linux-*.tar.gz; do tar -xzf "$f" -C bins; done
          for f in dl/itbaa-arabic-macos-*.zip; do unzip -o "$f" -d bins; done

      - name: Assemble packages
        env:
          BIN_DIR: ${{ github.workspace }}/bins
          INPUTS_TAG: ${{ inputs.tag }}
        run: node npm/scripts/prepare.mjs "${INPUTS_TAG}"

      # Platform packages first so the wrapper's optionalDependencies resolve on the registry.
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in npm/platforms/itbaa-*; do
            echo "publishing $d"
            (cd "$d" && npm publish --access public)
          done

      - name: Publish wrapper
        working-directory: npm/itbaa
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      # The release notes already document npm usage; attach the package tarball as a release asset.
      - name: Attach npm package to the release
        working-directory: npm/itbaa
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          tarball="$(npm pack | tail -n1)"
          gh release upload "$TAG" "$tarball" -R "$GITHUB_REPOSITORY" --clobber
