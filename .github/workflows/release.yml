name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.variant.name }} ${{ matrix.target.os }}-${{ matrix.target.arch }}
    runs-on: ${{ matrix.target.runner }}

    # vcpkg binary cache lives in a GitHub Packages NuGet feed (a registry, not ref-scoped), so every
    # run — including tag-triggered releases — restores prebuilt deps instead of rebuilding in Configure.
    env:
      LADYBIRD_SOURCE_DIR: ${{ github.workspace }}/ladybird
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/ahmedrowaihi/index.json,readwrite"

    strategy:
      fail-fast: true # all-or-nothing: a single failed binary cancels the rest, no partial release
      matrix:
        # Only the fork (upstream + the bidi/Arabic fix) is shipped; vanilla upstream added no
        # value for users and doubled CI. The "arabic" name is kept so asset names are stable.
        variant:
          - name: arabic
            repo: ahmedrowaihi/ladybird-itbaa
            ref: itbaa
        target:
          - { os: linux, arch: x86_64, runner: ubuntu-24.04, toolchain: GNU }
          - {
              os: linux,
              arch: arm64,
              runner: ubuntu-24.04-arm,
              toolchain: Clang,
            }
          - { os: macos, arch: arm64, runner: macos-14, toolchain: Clang }

    steps:
      - name: Checkout Itbaa
        uses: actions/checkout@v4

      - name: Checkout Ladybird (${{ matrix.variant.name }})
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.variant.repo }}
          ref: ${{ matrix.variant.ref }}
          path: ladybird
          fetch-depth: 1

      - name: Record resolved Ladybird SHA
        id: lb
        working-directory: ladybird
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Apply Itbaa patches
        run: |
          cd ladybird
          git apply ../patches/*.patch

      # Pre-install Ladybird's pinned Rust toolchain with the minimal profile (no clippy/rustfmt),
      # so the build's on-demand rustup sync can't hit the flaky clippy-preview component conflict.
      - name: Setup Rust toolchain
        working-directory: ladybird
        run: |
          rustup set profile minimal
          rustup show

      # mainline llvm clang rejects the macOS SDK's CF_ENUM macro in CoreFoundation-including
      # vcpkg ports (e.g. libproxy); Apple's clang exempts it. Suppress for dependency builds.
      - name: Suppress -Welaborated-enum-base for vcpkg (macOS)
        if: matrix.target.os == 'macos'
        run: |
          cat > ladybird/Meta/CMake/vcpkg/user-variables.cmake <<'CMK'
          if (APPLE)
              set(VCPKG_C_FLAGS "${VCPKG_C_FLAGS} -Wno-elaborated-enum-base")
              set(VCPKG_CXX_FLAGS "${VCPKG_CXX_FLAGS} -Wno-elaborated-enum-base")
          endif()
          CMK

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml requests six

      - name: Install Dependencies (Linux)
        if: matrix.target.os == 'linux'
        run: |
          sudo apt-get update -y
          # qt6-* is needed only at configure time: itbaa builds with ENABLE_GUI_TARGETS=ON
          # (that flag also gates LibWeb/LibGfx), which pulls in the Linux Qt GUI target. We
          # only compile itbaa-cli, so Qt is never actually built/linked.
          sudo apt-get install -y autoconf autoconf-archive automake build-essential \
            ccache cmake curl fonts-liberation2 gcc-14 g++-14 git libcurl4-openssl-dev \
            libdrm-dev libgl1-mesa-dev libssl-dev libstdc++-14-dev libtool mono-complete \
            nasm ninja-build pkg-config python3-venv qt6-base-dev qt6-tools-dev-tools \
            qt6-wayland tar unzip zip

          if [ "${{ matrix.target.toolchain }}" == "Clang" ]; then
            curl -f -o /tmp/llvm.key https://apt.llvm.org/llvm-snapshot.gpg.key
            sudo install -D /tmp/llvm.key /usr/share/keyrings/llvm-snapshot.gpg.key
            echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg.key] https://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update -y
            sudo apt-get install -y clang-20 lld-20
          fi

          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Install Dependencies (macOS)
        if: matrix.target.os == 'macos'
        run: |
          brew update
          brew install autoconf autoconf-archive automake bash ccache cmake coreutils \
            libtool llvm@20 mono nasm ninja pkg-config unzip

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.variant.name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}
          max-size: 3G

      - name: Setup vcpkg
        working-directory: ladybird
        run: ./Meta/Utils/build_vcpkg.py

      # Wire vcpkg's binary cache to the GitHub Packages feed. vcpkg needs nuget.exe for this, but arm64
      # sets VCPKG_FORCE_SYSTEM_BINARIES (no vcpkg-prebuilt helpers), which both blocks the download and
      # makes vcpkg look for a *system* `nuget`. So fetch nuget.exe once (guard dropped), then expose a
      # `nuget` wrapper on PATH — used for auth here and by `vcpkg install` in Configure.
      - name: Set up NuGet binary cache (GitHub Packages)
        env:
          VCPKG_EXE: ${{ github.workspace }}/ladybird/Build/vcpkg/vcpkg
          FEED_URL: https://nuget.pkg.github.com/ahmedrowaihi/index.json
          CACHE_TOKEN: ${{ secrets.VCPKG_CACHE_TOKEN }}
        run: |
          nuget_exe="$(env -u VCPKG_FORCE_SYSTEM_BINARIES "$VCPKG_EXE" fetch nuget | tail -n1)"
          mkdir -p "$RUNNER_TEMP/bin"
          printf '#!/bin/sh\nexec mono "%s" "$@"\n' "$nuget_exe" > "$RUNNER_TEMP/bin/nuget"
          chmod +x "$RUNNER_TEMP/bin/nuget"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/nuget" sources add -Source "$FEED_URL" -StorePasswordInClearText \
            -Name GitHubPackages -UserName ahmedrowaihi -Password "$CACHE_TOKEN"
          "$RUNNER_TEMP/bin/nuget" setapikey "$CACHE_TOKEN" -Source "$FEED_URL"

      - name: Set compiler (Linux GNU)
        if: matrix.target.os == 'linux' && matrix.target.toolchain == 'GNU'
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Set compiler (Linux Clang)
        if: matrix.target.os == 'linux' && matrix.target.toolchain == 'Clang'
        run: |
          echo "CC=clang-20" >> "$GITHUB_ENV"
          echo "CXX=clang++-20" >> "$GITHUB_ENV"

      - name: Set compiler (macOS)
        if: matrix.target.os == 'macos'
        run: |
          echo "CC=$(brew --prefix llvm@20)/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=$(brew --prefix llvm@20)/bin/clang++" >> "$GITHUB_ENV"

      - name: Configure
        working-directory: ladybird
        run: |
          # Stamp the reported version from the release tag (v1.2.3 -> 1.2.3).
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          ITBAA_VERSION="${TAG#v}"
          [ -n "$ITBAA_VERSION" ] || ITBAA_VERSION="0.0.0-dev"
          if [ "${{ matrix.target.os }}" == "macos" ]; then
            # Rust crate static archives aren't 8-byte aligned; the new ld rejects them, the classic linker accepts.
            cmake --preset Itbaa_Static -B Build \
              -DCMAKE_C_COMPILER="$CC" \
              -DCMAKE_CXX_COMPILER="$CXX" \
              -DBUILD_TESTING=OFF \
              -DENABLE_CI_BASELINE_CPU=ON \
              -DITBAA_VERSION="$ITBAA_VERSION" \
              -DPython3_EXECUTABLE="${{ env.pythonLocation }}/bin/python" \
              -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
              -DCMAKE_EXE_LINKER_FLAGS="-Wl,-ld_classic" \
              -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-ld_classic" \
              -DCMAKE_MODULE_LINKER_FLAGS="-Wl,-ld_classic"
          else
            # itbaa renders via Skia CPU; disable Vulkan so LibGfx doesn't require system libdrm
            # (which vcpkg's pkg-config can't see) on Linux.
            cmake --preset Itbaa_Static -B Build \
              -DCMAKE_C_COMPILER="$CC" \
              -DCMAKE_CXX_COMPILER="$CXX" \
              -DBUILD_TESTING=OFF \
              -DENABLE_CI_BASELINE_CPU=ON \
              -DITBAA_VERSION="$ITBAA_VERSION" \
              -DPython3_EXECUTABLE="${{ env.pythonLocation }}/bin/python" \
              -DCMAKE_DISABLE_FIND_PACKAGE_Vulkan=ON \
              -DCMAKE_DISABLE_FIND_PACKAGE_VulkanHeaders=ON
          fi

      - name: Build
        working-directory: ladybird
        run: cmake --build Build --target itbaa-cli

      # Run the freshly-built binary on this native runner: proves it renders, not just links.
      - name: Smoke test
        working-directory: ladybird
        run: |
          printf '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body dir="rtl"><h1>\xd9\x85\xd8\xb1\xd8\xad\xd8\xa8\xd8\xa7 Hello</h1><p>Arabic \xd9\x88 English</p></body></html>' > smoke.html
          ./Build/bin/itbaa render smoke.html smoke.pdf
          head -c5 smoke.pdf | grep -q '%PDF' || { echo "::error::output is not a valid PDF"; exit 1; }
          size=$(wc -c < smoke.pdf)
          [ "$size" -gt 1000 ] || { echo "::error::PDF suspiciously small ($size bytes) — likely nothing rendered"; exit 1; }
          echo "✓ Smoke test passed: rendered a ${size}-byte PDF"

      - name: Prepare artifact
        env:
          NAME: itbaa-${{ matrix.variant.name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}
        run: |
          mkdir -p artifact
          cp ladybird/Build/bin/itbaa "artifact/$NAME"
          chmod +x "artifact/$NAME"
          echo "${{ steps.lb.outputs.sha }}" > "artifact/$NAME.commit"
          cd artifact
          if [ "${{ matrix.target.os }}" == "linux" ]; then
            tar -czvf "$NAME.tar.gz" "$NAME"
          else
            zip "$NAME.zip" "$NAME"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itbaa-${{ matrix.variant.name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            artifact/itbaa-${{ matrix.variant.name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz
            artifact/itbaa-${{ matrix.variant.name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.zip
            artifact/itbaa-${{ matrix.variant.name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.commit
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    # Publish only when every binary built — never a partial release.
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Itbaa
        uses: actions/checkout@v4
        with:
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - name: Determine release tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Check for artifacts
        run: |
          if [ ! -d artifacts ] || [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "No artifacts found - all builds failed"
            exit 1
          fi
          echo "Available artifacts:"
          ls -la artifacts/

      - name: Build provenance + checksums
        id: notes
        run: |
          cd artifacts
          # Resolved Ladybird SHA (first .commit file found)
          ARABIC_SHA=$(cat "$(ls itbaa-arabic-*.commit 2>/dev/null | head -1)" 2>/dev/null || echo "n/a")
          # Checksums over the shippable archives only
          sha256sum itbaa-*.tar.gz itbaa-*.zip 2>/dev/null > SHA256SUMS || true
          echo "arabic_sha=$ARABIC_SHA" >> "$GITHUB_OUTPUT"
          # .commit files are provenance inputs, not release assets
          rm -f itbaa-*.commit

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Itbaa ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
          files: |
            artifacts/*
            install.sh
          generate_release_notes: true
          body: |
            ## Itbaa (اطبع) — HTML → PDF, PNG & JPEG

            A single self-contained CLI that turns HTML into **vector PDFs with
            selectable text**, or into images — powered by the Ladybird engine.
            Renders full CSS (flexbox, grid, gradients, shadows, transforms),
            `@font-face` web fonts, embedded raster images, and proper
            Arabic/bidirectional text. No browser, no network, no headless Chrome.

            ### Highlights

            - **Full-fidelity rendering** — gradients, box & text shadows, and
              nested layers paint correctly; PDFs stay vector with selectable
              text and emit gradients as native PDF shadings.
            - **Output modes** — vector PDF, PNG/JPEG (by output extension), a
              single tall page (`--single-page`, no page-break cuts), or a
              raster PDF (`--raster`).
            - **Print control** — page ranges (`2-5`, `3-`, `-4`, `1,3,5-7`),
              size presets (a4/letter/legal/a3) and custom `--width`/`--height`.
            - **Batch** — convert a folder or many files at once, derived output
              names, `--out-dir`, `--to png|jpg|pdf`.
            - **Scriptable** — `--format json` / NDJSON output and quiet/verbose
              modes for pipelines.
            - **Local assets** — web fonts, raster logos and CSS load straight
              from disk; mixed Arabic/English shaping and layout.

            Built on latest upstream Ladybird plus a bidirectional/Arabic text fix.

            ### Usage

            ```bash
            itbaa render input.html output.pdf             # vector PDF
            itbaa render report.html report.png --scale 2  # PNG image
            itbaa render long.html out.pdf --single-page   # one tall page, no cuts
            itbaa render input.html out.pdf --pages 2-5,8  # page subset
            itbaa render ./pages --out-dir ./pdfs          # batch a folder
            itbaa info input.html --format json            # page count & dimensions
            ```

            Run `itbaa help` for the full flag reference.

            ### Downloads

            | Platform | Arch | File |
            |----------|------|------|
            | Linux | x86_64 | `itbaa-arabic-linux-x86_64.tar.gz` |
            | Linux | arm64 | `itbaa-arabic-linux-arm64.tar.gz` |
            | macOS | arm64 | `itbaa-arabic-macos-arm64.zip` |

            Plus `install.sh` (`curl -fsSL …/install.sh | sh`).

            ### Build provenance

            Built from `ahmedrowaihi/ladybird-itbaa@itbaa` at commit `${{ steps.notes.outputs.arabic_sha }}`.

            Verify downloads against `SHA256SUMS`.
